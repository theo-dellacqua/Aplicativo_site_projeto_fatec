{% extends 'base.html' %}

{% block content %}

<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">

    <h2>OEE das últimas execuções por máquina</h2>

    <form method="GET">
        <label><strong>Produto:</strong></label>

        <select name="produto" onchange="this.form.submit()">
            {% for produto in produtos %}
                <option value="{{ produto }}"
                    {% if produto == produto_selecionado %}
                        selected
                    {% endif %}
                >
                    {{ produto }}
                </option>
            {% endfor %}
        </select>
    </form>

</div>

<img src="data:image/png;base64,{{ grafico }}"
     style="width:90%; border:1px solid #ccc; margin-top:20px;">

{% endblock %}
